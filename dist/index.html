<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="manifest" href="manifest.webmanifest" />
    <title>Lia Pulse</title>
    <style>
      :root { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      body { margin: 0; background: #0b1220; color: #e2e8f0; }
      .wrap { min-height: 100vh; display: grid; place-items: center; padding: 16px; }
      .card { width: 100%; max-width: 380px; background: #111827; border: 1px solid #1f2937; border-radius: 16px; padding: 20px; }
      h1 { margin: 0 0 12px; font-size: 1.2rem; }
      label { display: block; font-size: 0.9rem; margin-bottom: 8px; }
      input[type='password'], input[type='text'] { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #020617; color: #e2e8f0; }
      button { margin-top: 12px; width: 100%; padding: 12px; border: 0; border-radius: 10px; background: #2563eb; color: white; font-weight: 600; }
      .small { font-size: 0.85rem; color: #94a3b8; }
      .error { color: #fda4af; min-height: 1.2rem; }
      .row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section id="gate" class="card">
        <h1>Lia Pulse — Accès sécurisé</h1>
        <p class="small">V1 lecture seule.</p>
        <form id="pin-form">
          <label for="pin-input">PIN</label>
          <input id="pin-input" type="password" inputmode="numeric" autocomplete="off" required minlength="4" />
          <div class="row">
            <input id="toggle-pin" type="checkbox" />
            <label for="toggle-pin">Afficher le PIN</label>
          </div>
          <p id="pin-error" class="error" aria-live="polite"></p>
          <button type="submit">Déverrouiller</button>
        </form>
      </section>

      <section id="dashboard" class="card" hidden>
        <h1>Lia Pulse</h1>
        <p>Base UI prête. Passe 1 validée.</p>
      </section>
    </main>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
